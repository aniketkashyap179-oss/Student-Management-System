<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduTrack Pro — Student Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f0f4ff;--surface:#fff;--surface2:#f7f9ff;--border:#e2e8ff;
  --text:#1a1f3c;--text2:#5a6285;
  --accent:#4f6ef7;--accent2:#7c3aed;--accent3:#06b6d4;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --shadow:0 4px 24px rgba(79,110,247,.10);
  --shadow-lg:0 8px 48px rgba(79,110,247,.18);
  --radius:18px;--radius-sm:10px;
  --tr:all .3s cubic-bezier(.4,0,.2,1);
}
.dark{
  --bg:#0d0f1e;--surface:#151929;--surface2:#1a1f35;--border:#252a45;
  --text:#e8eaff;--text2:#8890b8;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 8px 48px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:var(--tr);}

/* ── Auth Screen ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg);}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;justify-content:center;}
.auth-logo-icon{width:50px;height:50px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 16px rgba(79,110,247,.35);}
.auth-logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.auth-logo-sub{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:1px;text-transform:uppercase;}
.auth-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.role-tabs{display:flex;gap:8px;margin-bottom:24px;background:var(--surface2);border-radius:12px;padding:4px;}
.role-tab{flex:1;padding:8px;border:none;background:transparent;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:var(--tr);font-family:inherit;}
.role-tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow);}
.form-group{margin-bottom:16px;}
label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;transition:var(--tr);outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,.1);}
textarea{resize:vertical;min-height:80px;}
select option{background:var(--surface);color:var(--text);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:var(--tr);font-family:inherit;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(79,110,247,.3);width:100%;justify-content:center;font-size:14px;padding:13px;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(79,110,247,.4);}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca;}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-success{background:#ecfdf5;color:var(--success);border:1px solid #a7f3d0;}
.btn-success:hover{background:var(--success);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}
.dark-mode .btn-danger{background:rgba(239,68,68,.15);}
.dark-mode .btn-success{background:rgba(16,185,129,.15);}

/* ── App Layout ── */
#app{display:none;min-height:100vh;}
#app.show{display:flex;}
.sidebar{width:260px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;box-shadow:4px 0 32px rgba(79,110,247,.07);transition:var(--tr);}
.main-area{margin-left:260px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.sidebar-logo{padding:24px 20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.logo-icon{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;box-shadow:0 4px 14px rgba(79,110,247,.35);}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.logo-sub{font-size:10px;color:var(--text2);font-weight:500;letter-spacing:1px;text-transform:uppercase;}
.role-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.role-admin{background:#fef2f2;color:var(--danger);}
.role-teacher{background:#f5f0ff;color:var(--accent2);}
.role-student{background:#ecfdf5;color:var(--success);}
.dark .role-admin{background:rgba(239,68,68,.15);}
.dark .role-teacher{background:rgba(124,58,237,.15);}
.dark .role-student{background:rgba(16,185,129,.15);}
nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;padding:12px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:var(--tr);color:var(--text2);font-weight:500;font-size:13px;position:relative;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,#eef2ff,#f5f0ff);color:var(--accent);font-weight:600;}
.dark .nav-item.active{background:rgba(79,110,247,.15);}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--accent);border-radius:0 4px 4px 0;}
.nav-item i{width:16px;text-align:center;font-size:14px;}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:12px;margin-bottom:8px;}
.user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:var(--text);}
.user-role{font-size:11px;color:var(--text2);}
.dark-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:10px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:1px solid var(--border);}
.toggle-sw{width:34px;height:18px;background:var(--border);border-radius:20px;position:relative;transition:var(--tr);}
.toggle-sw.on{background:var(--accent);}
.toggle-sw::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;left:3px;transition:var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-sw.on::after{left:19px;}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(79,110,247,.06);}
.header-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.header-right{display:flex;align-items:center;gap:10px;}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:40px;padding:7px 14px;width:220px;transition:var(--tr);}
.search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,.1);}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:inherit;width:100%;}
.search-wrap i{color:var(--text2);font-size:12px;}
.logout-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:var(--tr);}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}

/* ── Content ── */
.content{padding:28px;flex:1;}
.section{display:none;animation:fadeIn .35s ease;}
.section.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:var(--tr);}
.card:hover{box-shadow:var(--shadow-lg);}
.card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:700;}
.card-body{padding:22px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:var(--tr);box-shadow:var(--shadow);}
.stat-card:hover{transform:translateY(-3px) perspective(600px) rotateX(2deg);box-shadow:var(--shadow-lg);}
.stat-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;margin-bottom:14px;box-shadow:3px 5px 14px rgba(0,0,0,.15);}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.stat-sub{font-size:11px;color:var(--success);font-weight:600;margin-top:6px;}
.s-blue .stat-icon{background:linear-gradient(135deg,#4f6ef7,#7c9ff5);}
.s-purple .stat-icon{background:linear-gradient(135deg,#7c3aed,#a855f7);}
.s-cyan .stat-icon{background:linear-gradient(135deg,#06b6d4,#22d3ee);}
.s-green .stat-icon{background:linear-gradient(135deg,#10b981,#34d399);}
.s-red .stat-icon{background:linear-gradient(135deg,#ef4444,#f97316);}
.s-amber .stat-icon{background:linear-gradient(135deg,#f59e0b,#fcd34d);}

/* ── Table ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);padding:10px 14px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.b-blue{background:#eef2ff;color:var(--accent);}
.b-purple{background:#f5f0ff;color:var(--accent2);}
.b-green{background:#ecfdf5;color:var(--success);}
.b-cyan{background:#ecfeff;color:var(--accent3);}
.b-yellow{background:#fffbeb;color:var(--warn);}
.b-red{background:#fef2f2;color:var(--danger);}
.b-gray{background:#f1f5f9;color:#64748b;}
.dark .b-blue{background:rgba(79,110,247,.15);}
.dark .b-purple{background:rgba(124,58,237,.15);}
.dark .b-green{background:rgba(16,185,129,.15);}
.dark .b-red{background:rgba(239,68,68,.15);}
.dark .b-yellow{background:rgba(245,158,11,.15);}
.dark .b-gray{background:rgba(100,116,139,.15);}
.stu-cell{display:flex;align-items:center;gap:10px;}
.stu-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
.stu-name{font-weight:600;font-size:13px;}
.stu-roll{font-size:11px;color:var(--text2);}
.act-btns{display:flex;gap:5px;flex-wrap:wrap;}

/* ── Form Grid ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fg-full{grid-column:1/-1;}
.form-actions{display:flex;gap:10px;margin-top:6px;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
.modal{background:var(--surface);border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.25);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.4,0,.2,1);}
.modal-lg{max-width:720px;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:22px 26px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.close-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:var(--tr);}
.close-btn:hover{background:#fef2f2;color:var(--danger);}
.modal-body{padding:22px 26px 26px;}

/* ── Toast ── */
.toast-ct{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;box-shadow:0 8px 32px rgba(0,0,0,.15);display:flex;align-items:center;gap:10px;min-width:260px;animation:slideIn .3s ease;font-size:13px;font-weight:500;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-left:4px solid var(--success);}
.toast.error{border-left:4px solid var(--danger);}
.toast.info{border-left:4px solid var(--accent);}
.toast.success i{color:var(--success);}
.toast.error i{color:var(--danger);}
.toast.info i{color:var(--accent);}

/* ── Charts ── */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:24px;}
.chart-wrap{position:relative;height:200px;}

/* ── Attendance ── */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.att-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between;}
.att-name{font-size:13px;font-weight:600;}
.att-roll{font-size:11px;color:var(--text2);}
.att-btns{display:flex;gap:6px;}
.att-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;font-size:12px;font-weight:700;transition:var(--tr);}
.att-btn.P{border-color:var(--success);color:var(--success);}
.att-btn.P.active{background:var(--success);color:#fff;}
.att-btn.A{border-color:var(--danger);color:var(--danger);}
.att-btn.A.active{background:var(--danger);color:#fff;}
.att-btn.L{border-color:var(--warn);color:var(--warn);}
.att-btn.L.active{background:var(--warn);color:#fff;}

/* ── Notice ── */
.notice-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;transition:var(--tr);}
.notice-card:hover{box-shadow:var(--shadow);}
.notice-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.notice-content{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;}
.notice-meta{font-size:11px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;}

/* ── Timetable ── */
.tt-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;min-width:700px;}
.tt-header{background:var(--accent);color:#fff;padding:8px;text-align:center;font-size:12px;font-weight:700;border-radius:6px 6px 0 0;}
.tt-cell{background:var(--surface2);border:1px solid var(--border);padding:8px;min-height:70px;border-radius:4px;}
.tt-item{background:linear-gradient(135deg,#eef2ff,#f5f0ff);border:1px solid var(--border);border-radius:6px;padding:6px 8px;margin-bottom:4px;font-size:11px;}
.tt-subj{font-weight:700;color:var(--accent);}
.tt-time{color:var(--text2);}

/* ── Marks ── */
.marks-table .grade-A{color:var(--success);font-weight:700;}
.marks-table .grade-B{color:var(--accent);font-weight:700;}
.marks-table .grade-C{color:var(--warn);font-weight:700;}
.marks-table .grade-F{color:var(--danger);font-weight:700;}

/* ── Fee ── */
.fee-summary{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.fee-box{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.fee-box-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.fee-box-label{font-size:11px;color:var(--text2);font-weight:500;margin-top:3px;}

/* ── Profile ── */
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;}
.profile-av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;box-shadow:0 4px 20px rgba(79,110,247,.3);}
.profile-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.profile-details{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.detail-item label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
.detail-item .val{font-size:14px;font-weight:500;}

/* ── Loader ── */
.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2);}
.empty-state i{font-size:44px;opacity:.25;margin-bottom:14px;display:block;}

/* ── Responsive ── */
@media(max-width:900px){.stats-grid{grid-template-columns:1fr 1fr;}.charts-row{grid-template-columns:1fr;}.form-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.sidebar{transform:translateX(-100%);}.main-area{margin-left:0;}.stats-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <div>
        <div class="auth-logo-text">EduTrack Pro</div>
        <div class="auth-logo-sub">Student Management System</div>
      </div>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin')"><i class="fas fa-shield-halved"></i> Admin</button>
      <button class="role-tab" onclick="setRole('teacher')"><i class="fas fa-chalkboard-user"></i> Teacher</button>
      <button class="role-tab" onclick="setRole('student')"><i class="fas fa-user-graduate"></i> Student</button>
    </div>
    <div class="auth-title">Welcome Back!</div>
    <div class="auth-sub" id="auth-hint">Login with admin credentials</div>
    <div class="form-group"><label>Username</label><input type="text" id="login-user" placeholder="Enter username"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="Enter password"/></div>
    <button class="btn btn-primary" onclick="doLogin()" id="login-btn"><i class="fas fa-right-to-bracket"></i> Login</button>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text2)">
    </div>

<script>
// ══ State ══════════════════════════════════════════════════════════════════
const API = window.location.origin;
let token = null, role = null, userId = null, fullName = null, username = null;
let isDark = false, currentRole = 'admin';
let allStudents=[], allTeachers=[], allClasses=[], allSubjects=[];


// ══ Theme ══════════════════════════════════════════════════════════════════
function toggleDark(){
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
  document.getElementById('authDarkToggle')?.classList.toggle('on',isDark);
  document.getElementById('appDarkToggle')?.classList.toggle('on',isDark);
}

// ══ Auth ═══════════════════════════════════════════════════════════════════
function setRole(r){
  currentRole=r;
  document.querySelectorAll('.role-tab').forEach((t,i)=>t.classList.toggle('active',['admin','teacher','student'][i]===r));
  const hints={admin:'Login with admin credentials',teacher:'Login as teacher',student:'Login as student'};
  document.getElementById('auth-hint').textContent=hints[r];
}

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  if(!u||!p){toast('Enter username & password','error');return;}
  const btn=document.getElementById('login-btn');
  btn.innerHTML='<span class="loader"></span> Logging in...';btn.disabled=true;
  try{
    const res=await api('/api/auth/login',{method:'POST',body:{username:u,password:p}});
    if(res.error){toast(res.error,'error');return;}
    token=res.token;role=res.role;userId=res.user_id;fullName=res.full_name;username=res.username;
    localStorage.setItem('sms_token',token);
    localStorage.setItem('sms_role',role);
    localStorage.setItem('sms_name',fullName);
    localStorage.setItem('sms_uid',userId);
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').classList.add('show');
    setupApp();
    toast(`Welcome back, ${fullName}! 👋`,'success');
  }catch(e){toast('Login failed','error');}
  finally{btn.innerHTML='<i class="fas fa-right-to-bracket"></i> Login';btn.disabled=false;}
}

function logout(){
  token=null;role=null;userId=null;fullName=null;
  localStorage.removeItem('sms_token');localStorage.removeItem('sms_role');
  localStorage.removeItem('sms_name');localStorage.removeItem('sms_uid');
  document.getElementById('app').classList.remove('show');
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  toast('Logged out successfully','info');
}

// Auto-login from localStorage
window.addEventListener('load',()=>{
  const t=localStorage.getItem('sms_token');
  if(t){
    token=t;role=localStorage.getItem('sms_role');
    fullName=localStorage.getItem('sms_name');
    userId=parseInt(localStorage.getItem('sms_uid'));
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').classList.add('show');
    setupApp();
  }
});

// ══ API Helper ═════════════════════════════════════════════════════════════
async function api(url,opts={}){
  const headers={'Content-Type':'application/json'};
  if(token) headers['Authorization']=`Bearer ${token}`;
  try{
    const res=await fetch(API+url,{
      method:opts.method||'GET',
      headers,
      body:opts.body?JSON.stringify(opts.body):undefined
    });
    const data=await res.json();
    if(!res.ok) return {error:data.detail||'Error occurred'};
    return data;
  }catch(e){return {error:'Network error'};}
}

// ══ Toast ══════════════════════════════════════════════════════════════════
function toast(msg,type='success'){
  const icons={success:'circle-check',error:'circle-xmark',info:'circle-info'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<i class="fas fa-${icons[type]}"></i><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.style.opacity='0',3000);
  setTimeout(()=>el.remove(),3500);
}

// ══ Modal ══════════════════════════════════════════════════════════════════
function openModal(title,html,lg=false){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalBox').className='modal'+(lg?' modal-lg':'');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

        {id:'my-marks',icon:'star',label:'My Marks'},

        {id:'profile',icon:'circle-user',label:'My Profile'},

    ]

  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';
  (navCfg[role]||navCfg.student).forEach(group=>{

    group.items.forEach(item=>{

// ══ Navigation ═════════════════════════════════════════════════════════════
const pageTitles={
  'dashboard':'Dashboard','students':'Students','teachers':'Teachers',
  'classes':'Classes','subjects':'Subjects','marks':'All Marks',
  'attendance':'Attendance','timetable':'Timetable','fees':'Fee Management',

};

function showPage(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navEl=document.getElementById('nav-'+id);
  if(navEl) navEl.classList.add('active');
  document.getElementById('header-title').textContent=pageTitles[id]||id;
  const handlers={
    'dashboard':renderDashboard,'students':renderStudents,'teachers':renderTeachers,
    'classes':renderClasses,'subjects':renderSubjects,'marks':renderMarks,
    'attendance':renderAttendance,'timetable':renderTimetable,
    'fees':renderFees,'notices':renderNotices,'profile':renderProfile,
    'my-classes':renderMyClasses,'give-marks':renderGiveMarks,
    'my-marks':renderMyMarks,'my-fees':renderMyFees,'my-attendance':renderMyAttendance
  };
  if(handlers[id]) handlers[id]();
}

function setContent(html){document.getElementById('main-content').innerHTML=html;}

// ══ Helpers ════════════════════════════════════════════════════════════════
function initials(n){return (n||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
const AV_COLORS=['linear-gradient(135deg,#4f6ef7,#7c3aed)','linear-gradient(135deg,#06b6d4,#0ea5e9)','linear-gradient(135deg,#10b981,#84cc16)','linear-gradient(135deg,#f59e0b,#f97316)','linear-gradient(135deg,#ec4899,#f43f5e)'];
function avColor(n){return AV_COLORS[((n||'A').charCodeAt(0))%AV_COLORS.length];}
function calcGrade(obt,max){
  const p=(obt/max)*100;
  if(p>=90)return{g:'A+',cls:'grade-A'};if(p>=80)return{g:'A',cls:'grade-A'};
  if(p>=70)return{g:'B+',cls:'grade-B'};if(p>=60)return{g:'B',cls:'grade-B'};
  if(p>=50)return{g:'C',cls:'grade-C'};return{g:'F',cls:'grade-F'};
}
function feeBadge(s){
  const m={Paid:'b-green',Pending:'b-yellow',Overdue:'b-red',Waived:'b-gray'};
  return `<span class="badge ${m[s]||'b-gray'}">${s}</span>`;
}
function fmtDate(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('en-IN');}catch{return d;}}

function setAtt(sid,status){
  window._attData[sid]=status;
  ['P','A','L'].forEach(s=>{
    const btn=document.getElementById(`att-${sid}-${s}`);

  });
}

function markAllAtt(status){
  if(!window._attData) return;
  Object.keys(window._attData).forEach(sid=>setAtt(parseInt(sid),status));
}

async function submitAttendance(){
  const date=document.getElementById('att-date')?.value;
  const classId=iv('att-class')||'';
  const subjectId=iv('att-subj')||'';
  if(!window._attData||!Object.keys(window._attData).length){toast('No students to mark','error');return;}
  const records=Object.entries(window._attData).map(([sid,status])=>({
    student_id:parseInt(sid),class_id:classId,subject_id:subjectId,date,status
  }));
  const res=await api('/api/attendance',{method:'POST',body:{records}});
  if(res.error){toast(res.error,'error');return;}
  toast(res.message||'Attendance saved!','success');
}

  setContent(`
    <div class="page-header">
      <div><div class="page-title">Notice Board</div><div class="page-sub">${notices.length} notices</div></div>
      ${canPost?'<button class="btn btn-primary" onclick="openAddNoticeModal()"><i class="fas fa-plus"></i> Post Notice</button>':''}
    </div>
    ${notices.length?notices.map(n=>`
      <div class="notice-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="notice-title">${n.title}</div>
            <div class="notice-content">${n.content}</div>
            <div class="notice-meta">
              <span><i class="fas fa-user"></i> ${n.posted_by_name||'Admin'}</span>
              <span><i class="fas fa-clock"></i> ${fmtDate(n.created_at)}</span>
              <span class="badge ${n.target_role==='all'?'b-blue':n.target_role==='student'?'b-green':'b-purple'}">${n.target_role||'all'}</span>
            </div>
          </div>
          ${canPost?`<button class="btn btn-danger btn-xs" onclick="deleteNotice(${n.id})"><i class="fas fa-trash"></i></button>`:''}
        </div>
      </div>`).join(''):'<div class="empty-state"><i class="fas fa-bullhorn"></i><p>No notices posted</p></div>'}
  `);
}

function openAddNoticeModal(){
  openModal('Post Notice',`
    <div class="form-group"><label>Title *</label><input id="mn-title" placeholder="Notice title"/></div>
    <div class="form-group"><label>Content *</label><textarea id="mn-content" placeholder="Notice content..." style="min-height:120px"></textarea></div>
    <div class="form-group"><label>Target Audience</label><select id="mn-target">
      <option value="all">Everyone</option>
      <option value="student">Students Only</option>
      <option value="teacher">Teachers Only</option>
    </select></div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-primary" onclick="submitNotice()"><i class="fas fa-paper-plane"></i> Post Notice</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function submitNotice(){
  const d={title:v('mn-title'),content:v('mn-content'),target_role:v('mn-target')};
  if(!d.title||!d.content){toast('Fill required fields','error');return;}
  const res=await api('/api/notices',{method:'POST',body:d});
  if(res.error){toast(res.error,'error');return;}
  toast('Notice posted!','success');closeModal();renderNotices();
}

async function deleteNotice(id){
  await api(`/api/notices/${id}`,{method:'DELETE'});
  toast('Notice deleted','info');renderNotices();
}

// ══ Profile ════════════════════════════════════════════════════════════════
async function renderProfile(){
  const data=await api('/api/profile');
  const fields=role==='student'?[
    {k:'full_name',l:'Full Name'},{k:'roll_number',l:'Roll Number'},
    {k:'email',l:'Email'},{k:'phone',l:'Phone'},
    {k:'course',l:'Course'},{k:'semester',l:'Semester'},
    {k:'gender',l:'Gender'},{k:'dob',l:'Date of Birth'},
    {k:'guardian',l:'Guardian'},{k:'guardian_phone',l:'Guardian Phone'},
    {k:'address',l:'Address'},
  ]:role==='teacher'?[
    {k:'full_name',l:'Full Name'},{k:'email',l:'Email'},
    {k:'phone',l:'Phone'},{k:'subject_specialization',l:'Specialization'},
    {k:'qualification',l:'Qualification'},{k:'joining_date',l:'Joining Date'},
  ]:[
    {k:'full_name',l:'Full Name'},{k:'username',l:'Username'},
    {k:'email',l:'Email'},{k:'phone',l:'Phone'},
  ];
  setContent(`
    <div class="page-header"><div><div class="page-title">My Profile</div><div class="page-sub">Your account information</div></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
      <div class="card"><div class="card-body">
        <div class="profile-header">
          <div class="profile-av">${initials(fullName)}</div>
          <div><div class="profile-name">${fullName}</div><span class="role-badge role-${role}">${role}</span></div>
        </div>
        <div class="profile-details">
          ${fields.filter(f=>data[f.k]).map(f=>`<div class="detail-item"><label>${f.l}</label><div class="val">${data[f.k]||'—'}</div></div>`).join('')}
        </div>
      </div></div>
      <div class="card"><div class="card-header"><div class="card-title">Change Password</div></div>
      <div class="card-body">
        <div class="form-group"><label>Current Password</label><input id="cp-old" type="password" placeholder="Current password"/></div>
        <div class="form-group"><label>New Password</label><input id="cp-new" type="password" placeholder="New password"/></div>
        <div class="form-group"><label>Confirm New Password</label><input id="cp-con" type="password" placeholder="Confirm new password"/></div>
        <button class="btn btn-primary" onclick="changePassword()" style="width:100%"><i class="fas fa-key"></i> Change Password</button>
      </div></div>
    </div>`);
}

async function changePassword(){
  const old=v('cp-old'),nw=v('cp-new'),con=v('cp-con');
  if(!old||!nw){toast('Fill all fields','error');return;}
  if(nw!==con){toast('Passwords do not match','error');return;}
  const res=await api('/api/auth/change-password',{method:'POST',body:{old_password:old,new_password:nw}});
  if(res.error){toast(res.error,'error');return;}
  toast('Password changed successfully!','success');
  document.getElementById('cp-old').value='';
  document.getElementById('cp-new').value='';
  document.getElementById('cp-con').value='';
}

// ══ Global Search ══════════════════════════════════════════════════════════
function globalSearch(q){
  if(q.length>2&&role==='admin'){showPage('students');}
}

// ══ Input helpers ══════════════════════════════════════════════════════════
function v(id){return document.getElementById(id)?.value?.trim()||'';}
function iv(id){const val=document.getElementById(id)?.value;return val?parseInt(val):null;}

// Enter key login
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('auth-screen').style.display!=='none') doLogin();});
</script>
